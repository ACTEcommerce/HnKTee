<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H & E GRAPHIC TEES | Cebu Premium Apparel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">H & E GRAPHIC <b>TEES</b></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active">Store</a></li>
                <li><a href="#" id="contactBtn">Contact</a></li>
                <li>
                    <button id="cartBtn" class="cart-trigger">
                        🛒 CART (<span id="cartCount">0</span>)
                    </button>
                </li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" id="shirtSearch" placeholder="Search designs...">
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <section class="filter-group">
                <h3>Categories</h3>
                <button class="filter-btn active" data-cat="all">All Designs</button>
                <button class="filter-btn" data-cat="for men">Men's section</button>
                <button class="filter-btn" data-cat="for women">Women's section</button>
                <button class="filter-btn" data-cat="unisex">Jacket's section</button>
            </section>

            <section class="filter-group" style="margin-top: 30px;">
                <h3>Sort By Price</h3>
                <select id="sortOrder" class="sort-dropdown">
                    <option value="default">Default</option>
                    <option value="low">Cheapest to Expensive</option>
                    <option value="high">Expensive to Cheapest</option>
                </select>
            </section>
        </aside>

        <section class="content">
            <div class="product-grid" id="productGrid"></div>
        </section>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content cart-modal-style">
            <span class="close-cart">&times;</span>
            <h2 style="border-bottom: 2px solid #000; padding-bottom:10px;">YOUR BAG</h2>
            <div id="cartItemsList"></div>
            <div class="cart-total-section">
                <h3 id="cartTotal">Total: $0.00</h3>
                <button class="add-btn" id="proceedCheckout" style="width:100%">PROCEED TO CHECKOUT</button>
            </div>
        </div>
    </div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-checkout" style="float:right; cursor:pointer; font-size:28px;">&times;</span>
            <h2>Checkout Details</h2>
            <form id="checkoutForm">
                <input type="text" placeholder="Full Name" class="form-input" required>
                <input type="text" placeholder="Shipping Address" class="form-input" required>
                <button type="submit" class="add-btn" style="width:100%;">Place Order</button>
            </form>
        </div>
    </div>

    <div id="contactModal" class="modal">
        <div class="modal-content" style="max-width: 450px; text-align: left;">
            <span class="close-contact" style="float:right; cursor:pointer; font-size:28px;">&times;</span>
            <h2 style="border-bottom: 2px solid #000; padding-bottom:10px;">CONTACT US</h2>
            <p>📍 Cebu City, Philippines</p>
            <p>📞 +63 954 345 6789</p>
            <p>📸 IG: @he_tees_cebu</p>
            <button class="add-btn" style="width:100%; margin-top:20px;" onclick="document.getElementById('contactModal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
